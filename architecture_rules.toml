root_package = "silicato"
source_root = "src/silicato"
layers = ["domain", "application", "adapters", "ui", "ports"]
forbidden_module_prefixes = [
  "silicato.config",
  "silicato.logging_jsonl",
  "silicato.tmux_picker",
  "silicato.orchestrator",
  "silicato.contracts",
  "silicato.adapters.tmux_sender",
]

[forbidden]
domain = ["application", "adapters", "ui", "ports"]
application = ["adapters", "ui"]
adapters = ["domain", "application", "ui"]
ui = ["domain"]
ports = ["domain", "application", "adapters", "ui"]
